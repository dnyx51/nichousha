<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>你瞅啥 / WatchTrend</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&family=Noto+Sans+SC:wght@400;500;700&display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }
        .hero-bg { background: linear-gradient(90deg, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.65) 100%), url('https://picsum.photos/id/1015/1920/1080') center/cover no-repeat; }
        .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-hover:hover { transform: translateY(-8px) scale(1.04); box-shadow: 0 25px 50px -12px rgb(236 72 153); }
    </style>
</head>
<body class="bg-zinc-950 text-white">

    <nav class="bg-black border-b border-zinc-800 sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-8 py-5 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="text-3xl">👀</div>
                <h1 id="logo-title" class="logo-font text-4xl tracking-tighter">你瞅啥</h1>
            </div>
            
            <div class="flex items-center gap-x-8 text-sm font-medium">
                <a href="#" onclick="switchTab(0)" class="tab-link active text-pink-400" id="tab-0" data-lang="nav-global">🌍 GLOBAL</a>
                <a href="#" onclick="switchTab(1)" class="tab-link" id="tab-1" data-lang="nav-tv">📺 TV</a>
                <a href="#" onclick="switchTab(2)" class="tab-link" id="tab-2" data-lang="nav-movies">🎬 MOVIES</a>
                <a href="#" onclick="switchTab(3)" class="tab-link" id="tab-3" data-lang="nav-rednote">🇨🇳 小红书</a>
                <a href="#" onclick="switchTab(4)" class="tab-link" id="tab-4" data-lang="nav-x">🐦 X BUZZ</a>
            </div>

            <div class="flex items-center gap-x-4">
                <button onclick="toggleLanguage()" id="lang-btn" class="px-5 py-2 bg-zinc-900 hover:bg-zinc-800 rounded-3xl text-sm font-medium border border-zinc-700 flex items-center gap-x-2">
                    <span id="current-lang">EN</span>
                </button>
                <button onclick="refreshAllData()" class="bg-gradient-to-r from-pink-500 to-violet-500 px-6 py-2.5 rounded-3xl text-sm font-semibold flex items-center gap-x-2">
                    <i class="fa-solid fa-rotate"></i> <span data-lang="refresh">REFRESH</span>
                </button>
            </div>
        </div>
    </nav>

    <header class="hero-bg h-screen flex items-center relative">
        <div class="max-w-screen-2xl mx-auto px-8 text-center">
            <h2 id="hero-title" class="text-7xl md:text-8xl font-semibold logo-font tracking-tighter leading-none mb-4">大家正在看啥？</h2>
            <p id="hero-sub" class="text-2xl text-zinc-300">Real-time Trending TV & Movies</p>
        </div>
    </header>

    <main class="max-w-screen-2xl mx-auto px-8 pb-20">
        <div id="content-0" class="tab-content">
            <div class="text-center mb-12">
                <h2 id="global-title" class="text-5xl font-semibold mb-3">🌍 Global Trending Right Now</h2>
                <p class="text-zinc-400">Sorted by highest rating • Powered by TMDb</p>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-8" id="global-grid"></div>
        </div>
    </main>

    <script>
        // ================== YOUR TMDb KEY ==================
        const TMDB_API_KEY = 'eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiI1MmY2ZWM1YzRhMjM1N2IwZjk2NTY0NDljMzQ0ZjdiZiIsIm5iZiI6MTc3NzcwNDQ0Ni42ODcsInN1YiI6IjY5ZjU5ZGZlZjY4YTUzNmQ5M2MyNjA3MiIsInNjb3BlcyI6WyJhcGlfcmVhZCJdLCJ2ZXJzaW9uIjoxfQ.7zlZnBYXtZxFskaZjshucumcpD49LzGt5t1xQaNPLUY'; // ← PASTE YOUR FULL V4 TOKEN HERE

        let currentLang = 'zh';

        const translations = {
            "logo": { zh: "你瞅啥", en: "WatchTrend" },
            "hero-title": { zh: "大家正在看啥？", en: "What's Everyone Watching?" },
            "hero-sub": { zh: "实时热门剧集与电影", en: "Real-time Trending TV & Movies" },
            "global-title": { zh: "🌍 全球实时趋势", en: "🌍 Global Trending Right Now" },
            "nav-global": { zh: "🌍 GLOBAL", en: "🌍 GLOBAL" },
            "refresh": { zh: "刷新", en: "REFRESH" }
        };

        let globalTrends = [];

        async function fetchTMDBTrends() {
            if (!TMDB_API_KEY || TMDB_API_KEY.length < 30) {
                alert(currentLang === 'zh' ? "请先设置有效的 TMDb API Key" : "Please set valid TMDb API Key");
                return;
            }
            try {
                const headers = {
                    'Authorization': `Bearer ${TMDB_API_KEY}`,
                    'accept': 'application/json'
                };

                const [tvRes, movieRes] = await Promise.all([
                    fetch('https://api.themoviedb.org/3/trending/tv/week', { headers }),
                    fetch('https://api.themoviedb.org/3/trending/movie/week', { headers })
                ]);

                const tv = await tvRes.json();
                const movie = await movieRes.json();

                globalTrends = [
                    ...tv.results.slice(0, 8).map(i => ({
                        title: i.name || i.title,
                        zhTitle: i.name || i.title,
                        year: (i.first_air_date || i.release_date || '2026').slice(0,4),
                        rating: i.vote_average.toFixed(1),
                        desc: i.overview ? i.overview.substring(0,120) + '...' : 'Popular right now',
                        zhDesc: i.overview ? i.overview.substring(0,120) + '...' : '热门中',
                        img: i.poster_path ? `https://image.tmdb.org/t/p/w500${i.poster_path}` : 'https://picsum.photos/id/1015/400/300'
                    })),
                    ...movie.results.slice(0, 8).map(i => ({
                        title: i.title,
                        zhTitle: i.title,
                        year: (i.release_date || '2026').slice(0,4),
                        rating: i.vote_average.toFixed(1),
                        desc: i.overview ? i.overview.substring(0,120) + '...' : 'Popular right now',
                        zhDesc: i.overview ? i.overview.substring(0,120) + '...' : '热门中',
                        img: i.poster_path ? `https://image.tmdb.org/t/p/w500${i.poster_path}` : 'https://picsum.photos/id/133/400/300'
                    }))
                ];

                renderCards();
            } catch(e) {
                console.error(e);
                alert(currentLang === 'zh' ? "TMDb 拉取失败，请检查 API Key" : "Failed to fetch from TMDb. Check API key.");
            }
        }

        function renderCards() {
            globalTrends.sort((a, b) => parseFloat(b.rating) - parseFloat(a.rating));
            const container = document.getElementById('global-grid');
            container.innerHTML = globalTrends.map(item => `
                <a href="https://www.themoviedb.org/search?query=${encodeURIComponent(item.title)}" target="_blank" class="block">
                    <div class="card-hover bg-zinc-900 rounded-3xl overflow-hidden border border-zinc-700 h-full flex flex-col">
                        <img src="${item.img}" class="w-full aspect-video object-cover">
                        <div class="p-5 flex-1 flex flex-col">
                            <h3 class="font-semibold text-xl">${currentLang === 'zh' ? item.zhTitle : item.title}</h3>
                            <p class="text-emerald-400 font-medium">★ ${item.rating}</p>
                            <p class="text-sm text-zinc-300 mt-3 line-clamp-4">${currentLang === 'zh' ? item.zhDesc : item.desc}</p>
                        </div>
                    </div>
                </a>
            `).join('');
        }

        function toggleLanguage() {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            document.getElementById('logo-title').textContent = translations.logo[currentLang];
            document.getElementById('current-lang').textContent = currentLang === 'zh' ? 'EN' : '中文';
            
            document.querySelectorAll('[data-lang]').forEach(el => {
                const key = el.getAttribute('data-lang');
                if (translations[key]) el.textContent = translations[key][currentLang];
            });
            renderCards();
        }

        function switchTab(n) {
            alert(currentLang === 'zh' ? "更多内容即将上线！" : "More sections coming soon!");
        }

        function refreshAllData() {
            fetchTMDBTrends();
        }

        // Auto refresh every 12 hours
        setInterval(fetchTMDBTrends, 12 * 60 * 60 * 1000);

        window.onload = () => {
            fetchTMDBTrends();
        };
    </script>
</body>
</html>
