<body class="bg-zinc-950 text-white">
    <nav class="bg-black border-b border-zinc-800 sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-8 py-5 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-10 h-10 bg-gradient-to-br from-pink-500 to-violet-500 rounded-2xl flex items-center justify-center text-3xl">👀</div>
                <h1 class="logo-font text-4xl tracking-tighter" data-lang="logo">你瞅啥 / WatchTrend</h1>
            </div>
            <div class="flex items-center gap-x-8">
                <div class="hidden md:flex items-center gap-x-8 text-sm font-medium">
                    <a href="#" onclick="switchTab(0)" class="tab-link active text-pink-400 flex items-center gap-x-1" id="tab-0" data-lang="nav-global">🌍 GLOBAL</a>
                    <a href="#" onclick="switchTab(1)" class="tab-link flex items-center gap-x-1 hover:text-pink-400" id="tab-1" data-lang="nav-tv">📺 TV</a>
                    <a href="#" onclick="switchTab(2)" class="tab-link flex items-center gap-x-1 hover:text-pink-400" id="tab-2" data-lang="nav-movies">🎬 MOVIES</a>
                    <a href="#" onclick="switchTab(3)" class="tab-link flex items-center gap-x-1 hover:text-pink-400" id="tab-3" data-lang="nav-rednote">🇨🇳 小红书</a>
                    <a href="#" onclick="switchTab(4)" class="tab-link flex items-center gap-x-1 hover:text-pink-400" id="tab-4" data-lang="nav-x">🐦 X BUZZ</a>
                </div>
                <div class="flex items-center gap-x-4">
                    <button onclick="toggleLanguage()" id="lang-btn" class="px-4 py-1.5 bg-zinc-900 hover:bg-zinc-800 rounded-3xl text-sm font-medium border border-zinc-700 flex items-center gap-x-2">
                        <span id="current-lang">EN / 中文</span>
                    </button>
                    <button onclick="refreshAllData()" class="bg-gradient-to-r from-pink-500 to-violet-500 hover:from-pink-600 px-6 py-2.5 rounded-3xl text-sm font-semibold flex items-center gap-x-2 transition-all">
                        <i class="fa-solid fa-rotate"></i> <span data-lang="btn-refresh">LIVE REFRESH</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <header class="hero-bg h-screen flex items-center relative">
        <div class="max-w-screen-2xl mx-auto px-8 text-center">
            <div class="inline-flex items-center gap-x-2 bg-white/10 backdrop-blur-md px-6 py-2 rounded-3xl mb-6 text-sm">
                <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
                <span data-lang="live">LIVE • 2026年5月</span>
            </div>
            <h2 class="text-7xl md:text-8xl font-semibold logo-font tracking-tighter leading-none mb-4" data-lang="hero-title">
                大家正在看啥？<br>What's Everyone Watching?
            </h2>
            <p class="text-xl text-zinc-300 max-w-xl mx-auto" data-lang="hero-desc">
                IMDb • X • 小红书 实时趋势
            </p>
            <button onclick="fetchTMDBTrends()" class="mt-10 px-10 py-4 bg-white text-black rounded-3xl font-semibold flex items-center gap-x-3 mx-auto hover:bg-amber-300 transition-all">
                <i class="fa-solid fa-bolt"></i> <span data-lang="btn-tmdb">从 TMDb 拉取最新趋势 / Fetch from TMDb</span>
            </button>
        </div>
    </header>

    <main class="max-w-screen-2xl mx-auto px-8 pb-20">
        <div id="content-0" class="tab-content">
            <div class="flex justify-between items-baseline mb-8">
                <h2 class="text-4xl font-semibold" data-lang="global-title">🌍 Global Live Trends</h2>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6" id="global-grid"></div>
        </div>
        <div id="content-1" class="tab-content hidden">
            <h2 class="text-4xl font-semibold mb-8" data-lang="tv-title">📺 Hot TV Shows</h2>
            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6" id="tv-grid"></div>
        </div>
        <div id="content-2" class="tab-content hidden">
            <h2 class="text-4xl font-semibold mb-8" data-lang="movies-title">🎬 Trending Movies</h2>
            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6" id="movie-grid"></div>
        </div>
        <div id="content-3" class="tab-content hidden">
            <div class="flex justify-between items-baseline mb-8">
                <h2 class="text-4xl font-semibold" data-lang="rednote-title">🇨🇳 小红书 on English TV/Movies</h2>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6" id="rednote-grid"></div>
        </div>
        <div id="content-4" class="tab-content hidden">
            <h2 class="text-4xl font-semibold mb-8" data-lang="x-title">🐦 Live X Buzz</h2>
            <div class="space-y-6" id="x-buzz"></div>
        </div>
    </main>

    <footer class="bg-black py-12 border-t border-zinc-800 text-center text-zinc-400 text-sm">
        <p data-lang="footer">你瞅啥 / WatchTrend @dnyx51 • nichousha repo</p>
        <a href="https://github.com/dnyx51/nichousha" target="_blank" class="text-pink-400 hover:underline mt-4 inline-block">GitHub Repo</a>
    </footer>

    <script>
        const TMDB_API_KEY = 'e18f60cbea11335a1851da0e498fcf05'; // Your key (you can change it)

        let currentLang = 'zh';
        let globalTrends = [];
        let tvShows = [];
        let movies = [];
        let rednoteTrends = [
            {title: "Spider-Noir", zhTitle: "蜘蛛侠：黑色", year: "2026", rating: "🔥", desc: "Marvel Noir buzz", zhDesc: "漫威黑色蜘蛛侠热议", img: "https://picsum.photos/id/133/400/300", tmdbId: null},
            {title: "Lord of the Flies", zhTitle: "蝇王", year: "2026", rating: "Netflix", desc: "Netflix adaptation", zhDesc: "Netflix改编", img: "https://picsum.photos/id/201/400/300", tmdbId: null}
        ];
        let xBuzz = [
            {user: "@TVInsider", text: "May 2026 new releases", zhText: "2026年5月新剧上线", likes: "1.2K"}
        ];

        const translations = { /* same as before */ };

        function renderCards(containerId, data) {
            const container = document.getElementById(containerId);
            container.innerHTML = data.map(item => {
                let link = '#';
                if (item.tmdbId) {
                    const type = item.mediaType || 'tv';
                    link = `https://www.themoviedb.org/${type}/${item.tmdbId}`;
                } else if (item.title) {
                    link = `https://www.themoviedb.org/search?query=${encodeURIComponent(item.title)}`;
                }
                return `
                    <a href="${link}" target="_blank" class="block group">
                        <div class="card-hover bg-zinc-900 rounded-3xl overflow-hidden border border-zinc-700 cursor-pointer">
                            <img src="${item.img}" class="w-full aspect-video object-cover group-hover:brightness-110 transition">
                            <div class="p-4">
                                <h3 class="font-semibold">${currentLang === 'zh' && item.zhTitle ? item.zhTitle : item.title}</h3>
                                <p class="text-xs text-zinc-400">${item.year} • ${item.rating}</p>
                                <p class="text-sm text-zinc-300 mt-2 line-clamp-2">${currentLang === 'zh' && item.zhDesc ? item.zhDesc : item.desc}</p>
                                <div class="text-pink-400 text-xs mt-3 flex items-center gap-1">
                                    <i class="fa-solid fa-arrow-up-right-from-square"></i> View on TMDb
                                </div>
                            </div>
                        </div>
                    </a>
                `;
            }).join('');
        }

        async function fetchTMDBTrends() {
            if (!TMDB_API_KEY) return alert("No TMDb key");
            try {
                const [tvRes, movieRes] = await Promise.all([
                    fetch(`https://api.themoviedb.org/3/trending/tv/week?api_key=${TMDB_API_KEY}`),
                    fetch(`https://api.themoviedb.org/3/trending/movie/week?api_key=${TMDB_API_KEY}`)
                ]);
                const tv = await tvRes.json();
                const movie = await movieRes.json();

                globalTrends = [
                    ...tv.results.slice(0,3).map(i => ({title: i.name, zhTitle: i.name, year: i.first_air_date?.slice(0,4)||'2026', rating: i.vote_average.toFixed(1), desc: i.overview?.substring(0,80)+'...', img: `https://image.tmdb.org/t/p/w500${i.poster_path}`, tmdbId: i.id, mediaType: 'tv'})),
                    ...movie.results.slice(0,3).map(i => ({title: i.title, zhTitle: i.title, year: i.release_date?.slice(0,4)||'2026', rating: i.vote_average.toFixed(1), desc: i.overview?.substring(0,80)+'...', img: `https://image.tmdb.org/t/p/w500${i.poster_path}`, tmdbId: i.id, mediaType: 'movie'}))
                ];

                renderCards('global-grid', globalTrends);
            } catch(e) { console.error(e); }
        }

        // Other functions (switchTab, toggleLanguage, etc.) remain the same as your code
        // ... (copy the rest from your previous script)

        window.onload = () => {
            renderCards('global-grid', globalTrends);
            // render other grids...
            fetchTMDBTrends(); // auto load on start
        };
    </script>
</body>
